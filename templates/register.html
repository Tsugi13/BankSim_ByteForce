<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovoBanco — Criar Conta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0e0f;
      --panel:     #13161a;
      --border:    #222628;
      --gold:      #c9a84c;
      --gold-dim:  #8a6e2f;
      --text:      #e8e0d0;
      --muted:     #7a7670;
      --error-bg:  #1f1208;
      --error:     #e07a3a;
      --success-bg:#081a0f;
      --success:   #4caf82;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(201,168,76,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 460px;
      padding: 48px 44px 44px;
      background: var(--panel);
      border: 1px solid var(--border);
      position: relative;
      animation: fadeUp 0.6s ease both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand::before {
      content: '';
      display: inline-block;
      width: 20px; height: 1px;
      background: var(--gold);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 300;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 36px;
      font-weight: 300;
    }

    .flash {
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 24px;
      border-left: 2px solid;
    }
    .flash.error   { background: var(--error-bg);   color: var(--error);   border-color: var(--error);   }
    .flash.success { background: var(--success-bg); color: var(--success); border-color: var(--success); }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field { margin-bottom: 22px; }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--gold-dim); }
    input::placeholder { color: var(--muted); font-size: 13px; }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: var(--gold);
      color: #0c0e0f;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    button[type="submit"]:hover  { background: #dbb95a; }
    button[type="submit"]:active { transform: scale(0.99); }

    .footer-link {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .footer-link a {
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .footer-link a:hover { border-color: var(--gold); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">NovoBanco</div>
    <h1>Abra sua<br>conta hoje.</h1>
    <p class="subtitle">Preencha os dados abaixo para começar.</p>

    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}

    <form method="POST" action="/register">
      <div class="field">
        <label for="name">Nome completo</label>
        <input type="text" id="name" name="name" placeholder="João Silva" required autofocus />
      </div>

      <div class="row">
        <div class="field">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="joao@email.com" required />
        </div>
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>

      <button type="submit">Criar conta</button>
    </form>

    <p class="footer-link">
      Já tem conta? <a href="/login">Fazer login</a>
    </p>
  </div>
</body>
</html>
